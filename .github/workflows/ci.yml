name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    env:
      OPENAI_API_KEY: test-openai-key
      TAVILY_API_KEY: test-tavily-key
      OPENAI_BASE_URL: https://api.openai.com/v1
      MODEL_NAME: gpt-4o-mini
      APP_ENV: test
      DEBUG: "false"
      API_KEY: test-api-key
      ENABLE_METRICS: "false"
      ENABLE_TRACING: "false"
      SESSION_BACKEND: memory
      CHECKPOINT_BACKEND: memory
      SESSION_BACKEND_FALLBACK_ENABLED: "true"
      SOURCE_RESULT_LIMIT: "5"
      REDIS_URL: redis://localhost:6379/15
      REDIS_KEY_PREFIX: medlearn-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        run: pip install -e .

      - name: Install test and lint dependencies
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            ruff \
            httpx

      - name: Verify import path
        run: python -c "import healthbot; print('healthbot import OK')"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: |
          pytest \
            -q \
            --maxfail=1 \
            --disable-warnings \
            --cov=src/healthbot \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml