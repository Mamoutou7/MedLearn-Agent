name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package and lint dependencies
        run: |
          pip install -e .
          pip install ruff

      - name: Verify import path
        run: python -c "import healthbot; print('healthbot import OK')"

      - name: Run Ruff
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    env:
      OPENAI_API_KEY: test-openai-key
      TAVILY_API_KEY: test-tavily-key
      OPENAI_BASE_URL: https://openai.vocareum.com/v1
      MODEL_NAME: gpt-4o-mini
      APP_ENV: test
      DEBUG: "false"
      API_KEY: test-api-key
      ENABLE_METRICS: "false"
      ENABLE_TRACING: "false"
      SESSION_BACKEND: memory
      CHECKPOINT_BACKEND: sqlite
      CHECKPOINT_SQLITE_PATH: .data/test_checkpoints.db
      SESSION_BACKEND_FALLBACK_ENABLED: "true"
      SOURCE_RESULT_LIMIT: "5"
      REDIS_URL: redis://localhost:6379/15
      REDIS_KEY_PREFIX: medlearn-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package and test dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        run: |
          pytest \
            -q \
            --maxfail=1 \
            --disable-warnings \
            --cov=src/healthbot \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml

  evals:
    name: Prompt evaluations
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      OPENAI_BASE_URL: https://openai.vocareum.com/v1
      MODEL_NAME: gpt-4o-mini
      APP_ENV: test
      DEBUG: "false"
      API_KEY: test-api-key
      ENABLE_METRICS: "false"
      ENABLE_TRACING: "false"
      SESSION_BACKEND: memory
      CHECKPOINT_BACKEND: sqlite
      CHECKPOINT_SQLITE_PATH: .data/test_checkpoints.db
      SESSION_BACKEND_FALLBACK_ENABLED: "true"
      SOURCE_RESULT_LIMIT: "5"
      REDIS_URL: redis://localhost:6379/15
      REDIS_KEY_PREFIX: medlearn-test
      AVG_COMBINED_SCORE_THRESHOLD: "0.90"
      AVG_SAFETY_SCORE_THRESHOLD: "0.90"
      AVG_MIN_REFUSAL_SCORE_THRESHOLD: "0.90"
      AVG_GROUDING_THRESHOLD: "0.85"
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package and eval dependencies
        run: |
          pip install -e .
          pip install httpx

      - name: Validate secrets
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is missing"
            exit 1
          fi

      - name: Run prompt evaluations
        run: python -m scripts.run_prompt_evals

      - name: Upload eval results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json

  quality-summary:
    name: Quality summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - evals
    if: ${{ always() }}

    steps:
      - name: Print pipeline summary
        run: |
          echo "Lint result: ${{ needs.lint.result }}"
          echo "Test result: ${{ needs.test.result }}"
          echo "Evals result: ${{ needs.evals.result }}"