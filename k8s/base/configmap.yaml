apiVersion: v1
kind: ConfigMap
metadata:
  name: medlearn-config
  namespace: medlearn
data:
  APP_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://medlearn.local"

  MODEL_NAME: "gpt-4o-mini"
  JUDGE_MODEL_NAME: "gpt-4o-mini"

  SESSION_BACKEND: "redis"
  CHECKPOINT_BACKEND: "sqlite"

  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"

  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "medlearn-agent"
  OTEL_ENVIRONMENT: "production"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://grafana-alloy:4318/v1/traces"

  TRUSTED_HEALTH_DOMAINS: "cdc.gov,who.int,nih.gov,medlineplus.gov,nhs.uk,mayoclinic.org"
  SOURCE_RESULT_LIMIT: "5"

  HEALTH_AGENT_PROMPT_VERSION: "v1"
  TOPIC_REJECTION_PROMPT_VERSION: "v1"
  QUIZ_GENERATION_PROMPT_VERSION: "v1"
  QUIZ_EXPLANATION_PROMPT_VERSION: "v1"
  JUDGE_PROMPT_VERSION: "v1"

  PROMPT_AB_TESTING_ENABLED: "false"
  HEALTH_AGENT_PROMPT_AB_WEIGHTS: "v1:100"

  AVG_COMBINED_SCORE_THRESHOLD: "0.90"
  AVG_SAFETY_SCORE_THRESHOLD: "0.90"
  AVG_MIN_REFUSAL_SCORE_THRESHOLD: "0.90"
  AVG_GROUNDING_SCORE_THRESHOLD: "0.85"