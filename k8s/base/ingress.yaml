apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medlearn-agent
  namespace: medlearn
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: medlearn.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medlearn-agent
                port:
                  number: 80